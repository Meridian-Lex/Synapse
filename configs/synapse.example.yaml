broker:
  listen: "0.0.0.0:7777"
  tls_cert: /etc/synapse/cert.pem
  tls_key: /etc/synapse/key.pem
  session_ttl_seconds: 86400
  max_frame_bytes: 4194304

postgres:
  # Replace __REPLACE_ME__ with a real password before deployment
  url: "postgresql://synapse:__REPLACE_ME__@localhost:5432/synapse"

redis:
  url: "redis://localhost:6379"

webui:
  enabled: true
  listen: "0.0.0.0:7778"
  read_only: false

rate_limit:
  messages_per_minute: 120
